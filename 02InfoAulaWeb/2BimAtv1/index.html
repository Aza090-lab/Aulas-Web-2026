<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizationList</title>

    <!--<link rel="stylesheet" href="css/styles.css"/>!-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<body>
    <header><!--Titulo-->
    <h1>Organização de Lista</h1>
    </header>

    <div><!--Lista-->

        <input type="text" id = "Action"/> <!--Input da ação-->

        <select id="Prioridade"> <!--Seleção da prioridade-->
            <option>Prioridade Alta</option>
            <option>Prioridade Baixa</option>
        </select>

        <button onclick="add()" class="btn btn-outline-primary">OK</button> <!--Adiciona na lista-->

    </div>

    <article><!--Lista-->
        <ul id="Lista">

        </ul>
    </article>

    <!--=====Script=====-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        function add(){
            let action = document.getElementById("Action").value;
            let prioridade = document.getElementById("Prioridade").value;
            
            let p = document.createElement("li");
            p.innerHTML = action;

            if(prioridade == "Prioridade Alta"){
                p.style.color = "orange";
                p.classList.add("card text-bg-success mb-3");
            }
            else{
                p.style.color = "green";
            }
            

            let ul = document.getElementById("Lista");

            ul.appendChild(p);
        }
    </script>

</body>
</html>
