<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizationList</title>
    
    <link rel="shortcut icon" href="images/LogoIcon4.png"/>

    <!--<link rel="stylesheet" href="css/styles.css"/>!-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="p-3 mb-2 bg-dark text-white">
    <header><!--Titulo-->
        <img src="images/LogoIcon4.png" width="10%" height="10%"/>
        <!--<h1 >Organização de Lista</h1>!-->
        <div id="MenuButtons">
            <button class="btn btn-secondary">Cadastras-se</button>
            <button class="btn btn-success">Entrar</button>
            <button class="btn btn-outline-secondary">...</button>
        </div>
    </header>

    <hr class="card text-bg-secondary mb-3" style="margin: 0px;">

    <div><!--Lista-->

        <input type="text" id = "Action"/> <!--Input da ação-->

        <select id="Prioridade" > <!--Seleção da prioridade-->
            <option>Prioridade Alta</option>
            <option>Prioridade Baixa</option>
        </select>

        <button onclick="add()" class="btn btn-outline-secondary">OK</button> <!--Adiciona na lista-->

    </div>

    <article class="container"><!--Lista-->
        <ul id="Lista" class="row align-items-start">

        </ul>
    </article>

    <!--=====Script=====-->
    <script>
        function add(){
            let action = document.getElementById("Action").value;
            let prioridade = document.getElementById("Prioridade").value;
            
            let p = document.createElement("li");
            p.innerHTML = action;

            if(prioridade == "Prioridade Alta"){
                //p.style.color = "orange";
                p.classList.add("col-4", "card", "text-bg-danger", "mb-3");
                p.style.width = "300px";
                p.style.height = "300px";
            }
            else{
                //p.style.color = "green";
                p.classList.add("col-4", "card", "text-bg-success", "mb-3");
                p.style.width = "300px";
                p.style.height = "300px";
            }
            

            let ul = document.getElementById("Lista");

            ul.appendChild(p);
        }
    </script>

</body>
</html>
